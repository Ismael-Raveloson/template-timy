<div class="row justify-content-center">
  <div class="col-12">
    <h2 class="mb-2 page-title">Generic Data Table (Angular 18)</h2>
    <p class="card-text">Ce composant est hautement réutilisable, type-safe et utilise les API modernes d'Angular.</p>
    
    <div class="row my-4">
      <div class="col-md-12">
        <app-generic-data-table [data]="users()" [headers]="userHeaders">
          
          <!-- Template personnalisé pour le rendu des cellules -->
          <ng-template #rowTemplate let-row let-key="key" let-value="value">
            
            @switch (key) {
              @case ('id') {
                <div class="d-flex align-items-center">
                  <div class="custom-control custom-checkbox mr-2">
                    <input type="checkbox" class="custom-control-input" [id]="'check-' + row.id">
                    <label class="custom-control-label" [for]="'check-' + row.id"></label>
                  </div>
                  <strong>{{ value }}</strong>
                </div>
              }
              
              @case ('action') {
                <button class="btn btn-sm dropdown-toggle more-horizontal" type="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                  <span class="text-muted sr-only">Action</span>
                </button>
                <div class="dropdown-menu dropdown-menu-right">
                  <a class="dropdown-item" href="javascript:void(0);">Edit</a>
                  <a class="dropdown-item" href="javascript:void(0);">Remove</a>
                  <div class="dropdown-divider"></div>
                  <a class="dropdown-item" href="javascript:void(0);">Assign</a>
                </div>
              }
              
              @default {
                <span [class.text-muted]="!value">{{ value || '-' }}</span>
              }
            }
            
          </ng-template>
          
        </app-generic-data-table>
      </div>
    </div>
  </div>
</div>
